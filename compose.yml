services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rooibok_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - uploads_data:/var/www/html/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rooibok_net
    environment:
      APP_ENV:     ${APP_ENV}
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASS:     ${DB_PASS}
      REDIS_HOST:  redis
      BEANSTALK:   beanstalkd

  nginx:
    image: nginx:1.25-alpine
    container_name: rooibok_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - uploads_data:/var/www/html/public/uploads:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - rooibok_net

  postgres:
    image: postgres:16-alpine
    container_name: rooibok_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rooibok_net

  postgres_archive:
    image: postgres:16-alpine
    container_name: rooibok_archive
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rooibok_archive
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pg_archive_data:/var/lib/postgresql/data
      - ./docker/postgres/archive_schema.sql:/docker-entrypoint-initdb.d/01_archive_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d rooibok_archive"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rooibok_net

  redis:
    image: redis:7-alpine
    container_name: rooibok_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rooibok_net

  beanstalkd:
    image: schickling/beanstalkd
    container_name: rooibok_queue
    restart: unless-stopped
    networks:
      - rooibok_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rooibok_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - rooibok_net
    profiles:
      - dev

  mailhog:
    image: mailhog/mailhog
    container_name: rooibok_mail
    restart: unless-stopped
    ports:
      - "8026:8025"
    networks:
      - rooibok_net
    profiles:
      - dev

volumes:
  pg_data:
  pg_archive_data:
  redis_data:
  uploads_data:
  certbot_data:

networks:
  rooibok_net:
    driver: bridge
