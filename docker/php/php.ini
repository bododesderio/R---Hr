upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 120
memory_limit = 256M
display_errors = Off
log_errors = On
date.timezone = Africa/Kampala

; Security hardening
expose_php = Off
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1
session.cookie_samesite = Lax
allow_url_include = Off
